services:
  mysql:
    image: mysql:8.0.42
    container_name: mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: infoq
    ports:
      - "3306:3306"
    volumes:
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/mysql/data/:/var/lib/mysql/
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/mysql/conf/:/etc/mysql/conf.d/
      - ../../sql/infoq_scaffold_2.0.0.sql:/docker-entrypoint-initdb.d/01-infoq.sql:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --explicit_defaults_for_timestamp=true
      - --lower_case_table_names=1
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7.2.8
    container_name: redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/redis/conf:/redis/config:rw
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/redis/data:/redis/data:rw
    command: redis-server /redis/config/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio:
    image: pgsty/minio:RELEASE.2026-02-14T12-00-00Z
    container_name: minio
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: infoq
      MINIO_ROOT_PASSWORD: infoq123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/minio/data:/data
    command: server /data --console-address ":9001"

  infoq-admin:
    build:
      context: ../../infoq-scaffold-backend/infoq-admin
      dockerfile: Dockerfile
    image: infoq/infoq-admin:2.1.2
    container_name: infoq-admin
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 9090
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/infoq/server/config/
      JAVA_OPTS: -Xms512m -Xmx1024m
    ports:
      - "9090:9090"
    volumes:
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/server/config/:/infoq/server/config/
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/server/logs/:/infoq/server/logs/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  infoq-frontend-vue:
    build:
      context: ../../infoq-scaffold-frontend-vue
      dockerfile: Dockerfile
      args:
        VITE_APP_CONTEXT_PATH: /vue/
        VITE_APP_BASE_API: /prod-api
        VITE_APP_PORT: 9091
    image: infoq/infoq-frontend-vue:2.1.2
    container_name: infoq-frontend-vue
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      NGINX_PORT: 9091
    ports:
      - "9091:9091"
    volumes:
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/vue/logs/:/var/log/nginx/

  infoq-frontend-react:
    build:
      context: ../../infoq-scaffold-frontend-react
      dockerfile: Dockerfile
      args:
        VITE_APP_CONTEXT_PATH: /react/
        VITE_APP_BASE_API: /prod-api
        VITE_APP_PORT: 9092
    image: infoq/infoq-frontend-react:2.1.2
    container_name: infoq-frontend-react
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      NGINX_PORT: 9092
    ports:
      - "9092:9092"
    volumes:
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/react/logs/:/var/log/nginx/

  nginx-web:
    image: nginx:1.28.2
    container_name: nginx-web
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/nginx/cert:/etc/nginx/cert
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${INFOQ_DEPLOY_ROOT:-/infoq}/nginx/log:/var/log/nginx
    depends_on:
      - infoq-admin
      - infoq-frontend-vue
      - infoq-frontend-react
