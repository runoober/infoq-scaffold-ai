--- # Docker Compose 部署覆盖配置
spring:
  datasource:
    dynamic:
      datasource:
        master:
          url: jdbc:mysql://mysql:3306/infoq?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
          username: root
          password: root

spring.data:
  redis:
    host: redis
    port: 6379
    password: '123456'

--- # 临时文件存储目录
spring.servlet.multipart.location: /infoq/server/temp
