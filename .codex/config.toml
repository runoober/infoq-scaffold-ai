[agents]
max_threads = 6
max_depth = 1

# Project-scoped MCP servers for this repository.
# Keep secrets out of version control. Configure optional tokens via environment variables.

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
enabled = true
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
env_vars = ["CONTEXT7_API_KEY"]
enabled = true
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.openai-docs]
url = "https://developers.openai.com/mcp"
enabled = true
tool_timeout_sec = 120

[mcp_servers.openai-docs.tools.search_openai_docs]
approval_mode = "approve"

[mcp_servers.openai-docs.tools.fetch_openai_doc]
approval_mode = "approve"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest"]
enabled = true
startup_timeout_sec = 20
tool_timeout_sec = 120

# Optional MCP servers. Enable only after completing the documented local setup.

[mcp_servers.figma-desktop]
url = "http://127.0.0.1:3845/mcp"
enabled = false
tool_timeout_sec = 120

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "GITHUB_MCP_PAT"
enabled = false
tool_timeout_sec = 120
